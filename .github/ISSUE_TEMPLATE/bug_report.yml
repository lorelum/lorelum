name: 🐛 Bug report
description: Report something that's broken or behaves unexpectedly
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please search existing issues first to avoid duplicates.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the unexpected behavior.
      placeholder: "When I ran `lore decide ...`, I expected X but got Y."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal reproducible steps. The more precise, the faster we can fix it.
      placeholder: |
        1. `lore install react-fullstack`
        2. `lore query "..."`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: lore-version
    attributes:
      label: Lorelum version
      description: Output of `lore --version` (or the commit hash if running from source).
      placeholder: "0.0.0-dev / commit abc1234"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS + runtime version + AI tool (if relevant).
      placeholder: "macOS 14 / <runtime + version> / Cursor 0.40"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant logs or stack traces. No screenshots of text please.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
